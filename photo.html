<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SAY MY NAME - PHOTO GALLERY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">EggRoll</div>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="board.html">BOARD</a></li>
                <li><a href="game.html">GAME</a></li>
            </ul>
        </nav>
    </header>

    <main id="photo-page">
        <section id="member-select-view">
            <h2>최애 멤버를 선택해 주세요!</h2>
            <div class="member-grid">
                <div class="member-card hitomi" onclick="openMemberGallery('HITOMI')">HITOMI</div>
                <div class="member-card shuie" onclick="openMemberGallery('SHUIE')">SHUIE</div>
                <div class="member-card mei" onclick="openMemberGallery('MEI')">MEI</div>
                <div class="member-card kanny" onclick="openMemberGallery('KANNY')">KANNY</div>
                <div class="member-card soha" onclick="openMemberGallery('SOHA')">SOHA</div>
                <div class="member-card dohee" onclick="openMemberGallery('DOHEE')">DOHEE</div>
                <div class="member-card junhwi" onclick="openMemberGallery('JUNHWI')">JUNHWI</div>
                <div class="member-card seungjoo" onclick="openMemberGallery('SEUNGJOO')">SEUNGJOO</div>
            </div>
            <button class="view-all-btn" onclick="openMemberGallery('ALL')">전체 사진 보기</button>
        </section>

        <section id="gallery-view" style="display:none;">
            <h2 id="gallery-title">MEMBER NAME</h2>
            <div id="upload-form" class="upload-section">
                <input type="text" id="nicknameInput" placeholder="닉네임" maxlength="10">
                <input type="file" id="imageInput" accept="image/*">
                <button onclick="uploadPhoto()">사진 등록</button>
            </div>

            <div id="photo-grid" class="photo-grid"></div>
            <button class="back-btn" onclick="showMemberSelect()">뒤로 가기</button>
        </section>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrhP_DPagVEzILp5MftnZXN5m1nJD3qgg",
        authDomain: "saymyname-fanpage.firebaseapp.com",
        projectId: "saymyname-fanpage",
        storageBucket: "saymyname-fanpage.firebasestorage.app",
        messagingSenderId: "613226162204",
        appId: "1:613226162204:web:641483775d9fad18cf57d9",
        measurementId: "G-XTHQ805VV9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const photoCol = collection(db, "photos");

    let currentMember = 'ALL';
    const memberOrder = ['HITOMI', 'SHUIE', 'MEI', 'KANNY', 'SOHA', 'DOHEE', 'JUNHWI', 'SEUNGJOO'];
    const memberColors = {
        'HITOMI': '#f6f07b', 'SHUIE': '#cca9dd', 'MEI': '#f2afce', 'KANNY': '#de3b60',
        'SOHA': '#f47c50', 'DOHEE': '#f0f0f0', 'JUNHWI': '#464153', 'SEUNGJOO': '#bcddc4'
    };

    // 화면 전환 함수들 (전역 등록)
    window.showMemberSelect = () => {
        document.getElementById('member-select-view').style.display = 'block';
        document.getElementById('gallery-view').style.display = 'none';
    };

    window.openMemberGallery = (member) => {
        currentMember = member;
        document.getElementById('member-select-view').style.display = 'none';
        document.getElementById('gallery-view').style.display = 'block';
        document.getElementById('gallery-title').innerText = member === 'ALL' ? "SAY MY NAME PHOTO" : member + " GALLERY";
        
        const uploadForm = document.getElementById('upload-form');
        uploadForm.style.display = (member === 'ALL') ? 'none' : 'block';
        
        loadPhotos(); // 멤버 변경 시 사진 다시 불러오기
    };

    // [사진 업로드] Firebase Storage + Firestore
    window.uploadPhoto = async () => {
        const fileInput = document.getElementById('imageInput');
        const nickInput = document.getElementById('nicknameInput');
        const file = fileInput.files[0];

        if (!nickInput.value.trim()) return alert("닉네임을 입력해주세요!");
        if (!file) return alert("사진을 선택해주세요!");

        try {
            alert("사진을 업로드 중입니다...");
            const fileName = `gallery/${Date.now()}_${file.name}`;
            const storageRef = ref(storage, fileName);
            
            // 1. Storage 업로드
            const snapshot = await uploadBytes(storageRef, file);
            const url = await getDownloadURL(snapshot.ref);

            // 2. Firestore 기록 (멤버 정보 포함)
            await addDoc(photoCol, {
                nickname: nickInput.value.trim(),
                imageUrl: url,
                storagePath: fileName, // 삭제를 위해 경로 저장
                member: currentMember,
                timestamp: serverTimestamp()
            });

            fileInput.value = "";
            nickInput.value = "";
            alert("등록 완료!");
        } catch (e) {
            console.error(e);
            alert("업로드 실패!");
        }
    };

    // [실시간 읽기] 멤버별 필터링 적용
    function loadPhotos() {
        let q = query(photoCol, orderBy("timestamp", "desc"));
        
        // 전체보기가 아닐 경우 해당 멤버만 필터링
        if (currentMember !== 'ALL') {
            q = query(photoCol, where("member", "==", currentMember), orderBy("timestamp", "desc"));
        }

        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('photo-grid');
            grid.innerHTML = "";
            
            let docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

            // 전체보기일 경우 멤버 순서대로 정렬
            if (currentMember === 'ALL') {
                docs.sort((a, b) => memberOrder.indexOf(a.member) - memberOrder.indexOf(b.member));
            }

            docs.forEach((p) => {
                const bgColor = memberColors[p.member] || '#ee9ca7';
                const textColor = (p.member === 'DOHEE') ? '#333' : 'white';
                
                grid.innerHTML += `
                    <div class="photo-card">
                        <img src="${p.imageUrl}">
                        <div class="tag" style="background-color: ${bgColor}; color: ${textColor};">${p.member}</div>
                        <div class="uploader-name">By. ${p.nickname}</div>
                        <button class="delete-btn" onclick="deletePhoto('${p.id}', '${p.storagePath}')">×</button>
                    </div>
                `;
            });
        });
    }

    // [삭제] DB와 Storage 둘 다 삭제
    window.deletePhoto = async (id, path) => {
        if (!confirm("정말 삭제하시겠습니까?")) return;
        try {
            await deleteDoc(doc(db, "photos", id));
            await deleteObject(ref(storage, path));
            alert("삭제되었습니다.");
        } catch (e) {
            console.error(e);
        }
    };
</script>
