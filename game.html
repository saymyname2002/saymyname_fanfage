<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세마넴을 피해라! - SAY MY NAME</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #gameCanvas {
            background: #fffafb; /* 팬 페이지 톤에 맞춘 배경 */
            display: block;
            margin: 0 auto;
            border: 2px solid #ee9ca7;
            cursor: none; /* 마우스 대신 캐릭터가 보이기 위함 */
        }
        .game-info { text-align: center; margin-top: 20px; }
        /* 처음에는 순위판을 보이지 않게 설정 */
        .ranking-board {
            display: none; /* 이 코드가 핵심입니다 */
            width: 300px;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">EggRoll</div>
                <audio id="bgm" loop>
                <source src="music/SAY MY NAME(세이마이네임) 'WaveWay' (Official Audio)" type="audio/mpeg">
                <source src="music/SAY MY NAME(세이마이네임) 'ShaLala' (Official Audio).mp3" type="audio/mpeg">
                <source src="music/SAY MY NAME(세이마이네임) 'iLy' (Official Audio).mp3" type="audio/mpeg">  
                <source src="music/UFO (ATTENT!ON).mp3" type="audio/mpeg">
            </audio>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="board.html">BOARD</a></li>
                <li><a href="photo.html">PHOTO</a></li>
            </ul>
        </nav>
    </header>

<main>
    <div class="game-info">
        <h2>멤버들의 사랑(?)을 피해보세요!</h2>
        <p id="score">Score: 0</p> 
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="ranking-board">
            <h3>🏆 실시간 TOP 10</h3>
            <ul id="rankList">
                <li>데이터 로딩 중...</li>
            </ul>
        </div>
    </div>

    <div class="controls">
        <label for="volumeRange">🎵 BGM 볼륨:</label>
        <input type="range" id="volumeRange" min="0" max="1" step="0.1" value="0.5">
        <span id="volumeValue">50%</span>
    </div>
</main>
    <script type="module" src="game.js"></script>
</body>
</html>
